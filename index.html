<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Matchsticks — Co-op Survival</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0a00; }

    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 16px 24px;
      pointer-events: none;
      font-family: 'Courier New', monospace;
      color: #ffe8c0;
      z-index: 10;
    }
    #hud .lives { font-size: 28px; letter-spacing: 4px; }
    #hud .score { font-size: 22px; text-align: right; }
    #hud .score span { font-size: 32px; font-weight: bold; color: #ffcc44; }

    /* Screens */
    .screen-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 5, 0, 0.85);
      z-index: 20;
      font-family: 'Courier New', monospace;
      color: #ffe8c0;
      text-align: center;
    }
    .screen-overlay.hidden { display: none; }

    #start-screen h1 { font-size: 48px; margin-bottom: 12px; color: #ff6622; }
    #start-screen .subtitle { font-size: 18px; margin-bottom: 32px; opacity: 0.7; }
    #start-screen .controls { font-size: 14px; line-height: 1.8; margin-bottom: 24px; opacity: 0.8; }
    #start-screen .highscores { margin-bottom: 24px; }
    #start-screen .highscores h3 { font-size: 16px; color: #ffaa33; margin-bottom: 8px; }
    #start-screen .highscores ol { font-size: 14px; padding-left: 20px; }
    #start-screen .highscores li { margin-bottom: 4px; }
    #start-screen .start-hint { font-size: 20px; animation: pulse 1.5s infinite; }

    #gameover-screen h1 { font-size: 42px; color: #ff4422; margin-bottom: 8px; }
    #gameover-screen .final-score { font-size: 36px; color: #ffcc44; margin-bottom: 24px; }
    #gameover-screen input {
      background: rgba(255,255,255,0.1);
      border: 1px solid #ff6622;
      color: #ffe8c0;
      padding: 8px 16px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      text-align: center;
      outline: none;
      margin-bottom: 16px;
    }
    #gameover-screen .save-hint { font-size: 14px; opacity: 0.6; margin-bottom: 16px; }
    #gameover-screen .restart-hint { font-size: 20px; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="lives" id="hud-lives">❤️❤️❤️</div>
    <div class="score">SCORE<br><span id="hud-score">0</span></div>
  </div>

  <!-- Start Screen -->
  <div class="screen-overlay" id="start-screen">
    <h1>🔥 MATCHSTICKS 🔥</h1>
    <div class="subtitle">Co-op Survival — Don't Get Burned!</div>
    <div class="controls">
      Player 1: W A S D<br>
      Player 2: ↑ ← ↓ →<br>
      Double-tap jump for double-jump!
    </div>
    <div class="highscores" id="start-highscores"></div>
    <div class="start-hint">Press SPACE or ENTER to start</div>
  </div>

  <!-- Game Over Screen -->
  <div class="screen-overlay hidden" id="gameover-screen">
    <h1>GAME OVER</h1>
    <div class="final-score" id="gameover-score">Score: 0</div>
    <input type="text" id="gameover-name" placeholder="Your name" maxlength="16" />
    <div class="save-hint">Press ENTER to save score</div>
    <div class="restart-hint hidden" id="gameover-restart">Press SPACE or ENTER to retry</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
